<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="X-UA-Compatible" content="ie=edge" />
    <title>CSS Exercise 02 - Form</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body class="color-bg-blue">
  <main class="form-container">
       <form action="/submitform" class="ira-form">
        <h1 class="main-heading-form">Roth IRA Calculator</h1>
        <div class="form-element">
        <label class="form-label for="balance">Balance ($)</label>   
        <input class="form-input" type="text" name="balance" id="balance">
        </div>   
        <div class="form-element">
          <label class="form-label" for="annual">Annual Contribution ($)</label>
   
          <input type="text" name="annual" id="annual">
        </div>   
        <fieldset>
          <legend >Maximize Contribution?</legend>
          <dev class="form-radio">
          <input type="radio" name="maximize" id="yes" value="yes">
          <label  for="yes">Yes</label>
          <input type="radio" name="maximize" id="no" value="no">
          <label  for="no">No</label>
          </dev>
        </fieldset>
        <div class="form-element">
          <label class="form-label" for="rate">Expected rate of return (%)</label>
          <input type="number" name="rate" id="rate">
        </div>
        <div class="form-element">
          <label class="form-label" for="current">Retirement Age</label>
          <input type="number" name="retire" id="current">
        </div>
        <div class="form-element">
          <label class="form-label" for="tax">Marginal tax rate (%)</label>
          <input type="number" name="tax" id="tax">
        </div>
        <div class="form-element">
          <input class="btn btn-submit" type="submit" value="Calculate">
          <input class="btn btn-reset" type="reset" value="Reset">
        </div>
       </form>
       <p class="form-note">This exercise is a simplified version of the Roth IRA Calculator at <a href="https://www.calculator.net/roth-ira-calculator.html"</p>
  </main>
  </body>
</html>
